<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaRelax | Edit Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#0ea5e9', secondary: '#0284c7', accent: '#f59e0b' }
                }
            }
        }
    </script>
    <style>
        .animate-shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex flex-col min-h-screen">
    
    <!-- Navbar -->
    <header class="fixed w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-md shadow-sm border-b">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-secondary flex items-center gap-2">
                <i class="fa-solid fa-water"></i> AquaRelax
            </a>
            <div class="flex items-center gap-4 text-gray-600">
                <a href="my_account.html" class="hover:text-primary"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Dashboard</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-28 pb-20">
        <div class="container mx-auto px-4 max-w-3xl">
            
            <h1 class="text-3xl font-bold mb-8 text-center text-gray-800">Edit Account Information</h1>

            <div class="bg-white rounded-2xl shadow-md p-8">
                <form class="space-y-6 validate-form" action="my_account.html">
                    
                    <div class="flex justify-center mb-6">
                        <div class="relative">
                            <div class="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center text-3xl font-bold shadow-lg">DS</div>
                            <button type="button" class="absolute bottom-0 right-0 bg-white text-primary border border-gray-200 rounded-full w-8 h-8 flex items-center justify-center shadow hover:bg-gray-50"><i class="fa-solid fa-camera"></i></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                            <input type="text" value="Dilawar" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-gray-800">
                            <p class="error-msg text-red-500 text-sm mt-1 hidden"></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                            <input type="text" value="Said" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-gray-800">
                            <p class="error-msg text-red-500 text-sm mt-1 hidden"></p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" value="233116@students.au.edu.pk" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-gray-800 bg-gray-50">
                        <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-circle-info"></i> Your email address is used for login.</p>
                        <p class="error-msg text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                        <input type="tel" value="(555) 123-4567" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-gray-800">
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <h3 class="font-bold text-lg mb-4">Change Password</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                                <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                                    <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                                    <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pt-6">
                        <a href="my_account.html" class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium transition-colors">Cancel</a>
                        <button type="submit" class="px-8 py-3 bg-primary hover:bg-secondary text-white rounded-lg font-bold shadow-md transition-colors">Save Changes</button>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
